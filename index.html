<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#04161F" />
    <meta name="color-scheme" content="dark" />

    <!-- Fallback title/description; per-route values are injected by react-helmet-async -->
    <title>Kite Pirates — Kite Surfing Hurghada | Red Sea Egypt</title>
    <meta
      name="description"
      content="Premium kite surfing courses, wing foil lessons, and all-inclusive Pirates Week packages in Hurghada, Red Sea. 270 days of wind. Max 10 pirates per week."
    />

    <!-- Referrer hardening: never leak full URLs/PII in the Referer header -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Performance: connect to font origins early, swap to avoid invisible text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital@1&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://kitepirateshurghada.com/" />
  </head>
  <body>
    <noscript>
      <div style="padding:24px;background:#080E14;color:#F0F8FF;font-family:sans-serif">
        Kite Pirates needs JavaScript enabled. Reach us directly at
        <a href="mailto:kitepirateseg@gmail.com" style="color:#00B4C6">kitepirateseg@gmail.com</a>.
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
